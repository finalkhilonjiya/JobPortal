name: khilonjiya_com
description: A comprehensive marketplace application built with Flutter for khilonjiya.com
publish_to: 'none'
version: 1.0.0+56

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_pdfview: ^1.3.2
  syncfusion_flutter_pdfviewer: ^28.1.37

  reorderables: ^0.6.0
  fl_chart: ^0.68.0
  sizer: ^2.0.15
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  carousel_slider: ^5.1.0
  font_awesome_flutter: ^10.7.0
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  lottie: ^3.1.2
  flutter_rating_bar: ^4.0.1
  pull_to_refresh: ^2.0.0

  provider: ^6.1.2

  supabase_flutter: ^2.5.6
  google_sign_in: ^6.3.0
  flutter_facebook_auth: ^7.1.2

  razorpay_flutter: ^1.3.7
  in_app_purchase: ^3.1.13

  share_plus: ^10.0.2
  url_launcher: ^6.3.0

  flutter_dotenv: ^5.1.0

  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  geolocator: ^11.1.0
  geocoding: ^2.2.0
  google_api_headers: ^4.4.0

  google_maps_flutter: ^2.6.0
  flutter_google_places_hoc081098: ^2.0.0

  image_picker: ^1.1.1
  cached_network_image: ^3.3.1

  file_picker: ^8.0.0

  http: ^1.2.1
  connectivity_plus: ^5.0.2

  intl: ^0.19.0
  timeago: ^3.6.1
  form_validator: ^2.1.1
  crypto: ^3.0.3

  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.3
  flutter_local_notifications: ^19.3.0

  permission_handler: ^11.4.0

  device_info_plus: ^10.1.0
  package_info_plus: ^8.3.0

  sms_autofill: ^2.3.0

  webview_flutter: ^4.7.0
  in_app_update: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.3.2
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/animations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Regular.ttf
        - asset: assets/fonts/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter_18pt-Bold.ttf
          weight: 700

flutter_native_splash:
  color: "#ffffff"
  image: assets/icons/spash_logo.png

  android: true
  ios: false
  web: false

  android_gravity: center

  android_12:
    color: "#ffffff"
    image: assets/icons/spash_logo.png
    icon_background_color: "#ffffff"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
